# Conda environment for sc_preprocessing_n.r (Seurat → .h5ad for MitoChontrol).
#
# Create and activate:
#   conda env create -f sc_preprocessing.yml
#   conda activate sc_preprocessing
#
# sc_preprocessing_n.r forces reticulate to use this env's Python (env name
# `sc_preprocessing`, or override with env var SC_PREPROCESSING_CONDA_ENV).
#
# Bioconductor (DropletUtils, SingleCellExperiment) and DoubletFinder (GitHub)
# are not fully reliable as cross-platform conda binaries; they are installed
# from R on first run — see the preamble in sc_preprocessing_n.r.
#
# All packages below are on conda-forge (Bioconductor/GitHub installs are
# handled in sc_preprocessing_n.r).

name: sc_preprocessing
channels:
  - conda-forge
dependencies:
  - r-base >=4.3,<4.6
  - r-rlang >=1.1.3
  - r-reticulate
  - r-remotes
  - r-seurat >=5
  - r-sccustomize
  - r-soupx
  - python >=3.10,<3.13
  - pip
  - numpy >=1.26,<2
  - scipy >=1.14,<1.15
  - anndata >=0.10,<0.11
